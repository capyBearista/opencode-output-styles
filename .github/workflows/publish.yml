name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync version from tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          OLD_VERSION=$(bun -e "console.log(require('./package.json').version)")
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
          if [ "$OLD_VERSION" != "$TAG_VERSION" ]; then
            npm version "$TAG_VERSION" --no-git-tag-version
            bun install --lockfile-only
            echo "VERSION_SYNCED=true" >> $GITHUB_ENV
          fi

      - name: Check if version already published
        run: |
          PACKAGE_NAME=$(bun -e "console.log(require('./package.json').name)")
          PUBLISHED=$(npm view "$PACKAGE_NAME@$VERSION" version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "Version $VERSION already published. Skipping publish."
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          fi

      - name: Generate release notes
        if: env.SKIP_PUBLISH != 'true'
        run: |
          if [ -f cliff.toml ]; then
            git cliff --latest --github-repo ${{ github.repository }} -o release-notes.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Create GitHub Release
        if: env.SKIP_PUBLISH != 'true'
        run: |
          if [ -f release-notes.md ]; then
            gh release create "v$VERSION" --title "v$VERSION" --notes-file release-notes.md
          else
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        if: env.SKIP_PUBLISH != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: env.SKIP_PUBLISH != 'true' && env.VERSION_SYNCED == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add package.json bun.lockb
          git diff --quiet --cached || git commit -m "chore(release): sync package version to $VERSION"
          git push origin HEAD:main
